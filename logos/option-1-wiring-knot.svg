<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Option 1: Wiring Knot — three wires crossing through a central node -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Wires -->
  <path d="M 10 30 C 30 30, 40 50, 50 50 C 60 50, 70 30, 90 30" fill="none" stroke="#4f46e5" stroke-width="3" stroke-linecap="round"/>
  <path d="M 10 50 C 30 50, 40 50, 50 50 C 60 50, 70 50, 90 50" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <path d="M 10 70 C 30 70, 40 50, 50 50 C 60 50, 70 70, 90 70" fill="none" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
  <!-- Central node -->
  <circle cx="50" cy="50" r="8" fill="url(#g1)"/>
  <!-- Input dots -->
  <circle cx="10" cy="30" r="3" fill="#4f46e5"/>
  <circle cx="10" cy="50" r="3" fill="#7c3aed"/>
  <circle cx="10" cy="70" r="3" fill="#a855f7"/>
  <!-- Output dots -->
  <circle cx="90" cy="30" r="3" fill="#4f46e5"/>
  <circle cx="90" cy="50" r="3" fill="#7c3aed"/>
  <circle cx="90" cy="70" r="3" fill="#a855f7"/>
</svg>
