<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Option 3: Nested Boxes — boxes within boxes, referencing the operadic nesting -->
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Outer box -->
  <rect x="12" y="20" width="76" height="60" rx="6" fill="none" stroke="#4f46e5" stroke-width="2.5"/>
  <!-- Inner boxes -->
  <rect x="20" y="35" width="22" height="18" rx="3" fill="#4f46e520" stroke="#4f46e5" stroke-width="2"/>
  <rect x="56" y="35" width="22" height="18" rx="3" fill="#7c3aed20" stroke="#7c3aed" stroke-width="2"/>
  <!-- Wire connecting inner boxes -->
  <line x1="42" y1="44" x2="56" y2="44" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow -->
  <polygon points="54,41 56,44 54,47" fill="#6366f1"/>
  <!-- Input wire from outside -->
  <line x1="2" y1="44" x2="20" y2="44" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <circle cx="2" cy="44" r="2.5" fill="#4f46e5"/>
  <!-- Output wire to outside -->
  <line x1="78" y1="44" x2="98" y2="44" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
  <circle cx="98" cy="44" r="2.5" fill="#7c3aed"/>
  <!-- Input port on outer box -->
  <circle cx="12" cy="44" r="3" fill="#4f46e5"/>
  <!-- Output port on outer box -->
  <circle cx="88" cy="44" r="3" fill="#7c3aed"/>
</svg>
