<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="240" height="200">
  <!-- Unwinding skein: a compact yarn ball on the left with wires unwinding and separating to the right -->
  <defs>
    <linearGradient id="gu1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gu2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="gu3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Yarn ball (left side) — concentric arcs -->
  <circle cx="30" cy="50" r="18" fill="#4f46e508" stroke="#4f46e5" stroke-width="2"/>
  <path d="M 18 44 C 22 36, 38 36, 42 44" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 16 52 C 20 58, 40 58, 44 52" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 20 38 C 16 44, 16 56, 20 62" fill="none" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M 40 38 C 44 44, 44 56, 40 62" fill="none" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M 22 42 C 28 38, 32 38, 38 42" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M 22 58 C 28 62, 32 62, 38 58" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Wires unwinding from the ball to the right -->
  <path d="M 48 44 C 58 40, 70 28, 110 25" fill="none" stroke="url(#gu3)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 48 50 C 62 50, 75 50, 110 50" fill="none" stroke="url(#gu1)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 48 56 C 58 60, 70 72, 110 75" fill="none" stroke="url(#gu2)" stroke-width="3" stroke-linecap="round"/>

  <!-- Output dots (clean, organized endpoints) -->
  <circle cx="110" cy="25" r="4" fill="#06b6d4"/>
  <circle cx="110" cy="50" r="4" fill="#6366f1"/>
  <circle cx="110" cy="75" r="4" fill="#a855f7"/>
</svg>
