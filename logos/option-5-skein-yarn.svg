<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="240" height="200">
  <!-- Skein: wires converging through a central knot that resembles a yarn ball -->
  <defs>
    <linearGradient id="gy1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gy2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gy3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Central yarn knot: overlapping arcs suggesting tangled thread -->
  <ellipse cx="60" cy="50" rx="14" ry="13" fill="#4f46e510" stroke="url(#gy1)" stroke-width="2"/>
  <!-- Internal yarn wraps -->
  <path d="M 52 42 C 56 38, 64 38, 68 42" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M 50 50 C 54 54, 66 54, 70 50" fill="none" stroke="#4f46e5" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M 52 58 C 56 62, 64 62, 68 58" fill="none" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M 55 40 C 50 46, 50 54, 55 60" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 65 40 C 70 46, 70 54, 65 60" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Wire 1: top — enters knot, exits organized -->
  <path d="M 8 25 C 25 25, 35 35, 47 43" fill="none" stroke="url(#gy2)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 73 43 C 85 35, 95 25, 112 25" fill="none" stroke="url(#gy2)" stroke-width="3" stroke-linecap="round"/>

  <!-- Wire 2: middle -->
  <path d="M 8 50 C 25 50, 38 50, 46 50" fill="none" stroke="url(#gy1)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 74 50 C 82 50, 95 50, 112 50" fill="none" stroke="url(#gy1)" stroke-width="3" stroke-linecap="round"/>

  <!-- Wire 3: bottom -->
  <path d="M 8 75 C 25 75, 35 65, 47 57" fill="none" stroke="url(#gy3)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 73 57 C 85 65, 95 75, 112 75" fill="none" stroke="url(#gy3)" stroke-width="3" stroke-linecap="round"/>

  <!-- Input dots -->
  <circle cx="8" cy="25" r="3.5" fill="#0ea5e9"/>
  <circle cx="8" cy="50" r="3.5" fill="#4f46e5"/>
  <circle cx="8" cy="75" r="3.5" fill="#a855f7"/>

  <!-- Output dots -->
  <circle cx="112" cy="25" r="3.5" fill="#6366f1"/>
  <circle cx="112" cy="50" r="3.5" fill="#7c3aed"/>
  <circle cx="112" cy="75" r="3.5" fill="#ec4899"/>
</svg>
